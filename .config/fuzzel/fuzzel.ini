# Fuzzel Configuration

[main]
# Font
font=JetBrains Mono:size=12

# Terminal for terminal apps
terminal=kitty

# Prompt
prompt="❯ "

# Window positioning
anchor=center
width=40
horizontal-pad=20
vertical-pad=12
inner-pad=8

# Appearance
layer=overlay

[colors]
background=282a36aa
text=f8f8f2ff
match=8be9fdff
selection-match=8be9fdff
selection=44475add
selection-text=f8f8f2ff
border=bd93f9ff

[border]
width=2
radius=6

[dmenu]
# Dmenu mode settings (if you use it as dmenu replacement)
exit-immediately-if-empty=yes
