continuation_prompt = 'в–¶в–¶ '

add_newline = false

[character]
success_symbol = "[пғҡ](fg:#00e6e6)" # у°Ғҡ оӘ¶ пғҡ
error_symbol = "[пғҡ](fg:red)"   # пҒң

[username]
disabled = false
show_always = true
format = "[$user]($style) "
style_user = "bold fg:#00ff99"
style_root = "bold red"

[hostname]
disabled = false
ssh_only = false  # Show always, not just in SSH
format = "[$ssh_symbol$hostname]($style) "
style = "bold fg:#9999fc"
trim_at = "."
ssh_symbol = "рҹҢҗ "

[directory]
disabled = false
format = "[$path]($style)"
style = "bold fg:#8be9fd"
truncate_to_repo = false
home_symbol = "о¬Ҷ " 

[git_branch]
format = " [ оӮ  $branch](fg:#e697e6)"

[git_status]
ahead = 'вҮЎ${count}'
behind = 'вҮЈ${count}'
diverged = 'вҮ•вҮЎ${ahead_count}вҮЈ${behind_count}'
format = '[[(оӘ„ $all_status$ahead_behind )](fg:#769ff0)]($style)'
style = "bg:#394260"


[time]
disabled = false
format = '[[ пҗә $time ](fg:#8df9b8 )]($style)'
time_format = "%R"                            # Hour:Minute Format

[deno]
format = " [deno](italic) [оҙҚ ](green bold)"
version_format = "${raw}"

[lua]
format = " [lua](italic) [${symbol}]($style)"
style = "bold bright-yellow"
symbol = "вЁҖ "
version_format = "${raw}"
detect_extensions = ["lua"]

[nodejs]
detect_files = ["package-lock.json", "yarn.lock"]
detect_folders = ["node_modules"]
format = "[пўҳ ](bold bright-green)"
version_format = "${raw}"
detect_extensions = ["js", "ts", "jsx", "tsx"]

[python]
format = "[${symbol}(${virtualenv}) ${version}]($style)"
style = "bold bright-yellow"
symbol = "[оҙӣ ](bold bright-blue)"
version_format = "${raw}"
detect_extensions = ["py"]
detect_files = [".venv"]

[ruby]
format = " [rb](italic) [${symbol}]($style)"
style = "bold red"
symbol = "оҳ… "
version_format = "${raw}"

[rust]
style = "bold bright-red"
format = " rs(italic) $symbol($style)"
symbol = "оҡӢ "

[swift]
format = " [sw](italic) [${symbol}]($style)"
style = "bold bright-red"
symbol = "оҡҷ "
version_format = "${raw}"

[aws]
disabled = true
format = " [aws](italic) [$symbol $profile $region]($style)"
style = "bold blue"
symbol = "пғҜ "

[buf]
style = "bold bright-red"
format = " [buf](italic) [$symbol $buf_version]($style)"
symbol = "в–  "

[c]
disabled = false
style = "bold bright-cyan"
format = " [$symbol]($style)"
symbol = "оқұ "
detect_extensions = ["c", "h"]
detect_files = ["CMakeLists.txt"]

[cpp]
