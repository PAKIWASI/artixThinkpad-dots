[Dracula]
; Dracula color scheme for Spicetify
; Based on https://draculatheme.com

; Main text (track names, headings)
text                = f8f8f2
; Secondary text (artist names, sidebar labels, mini info)
subtext             = 6272a4
; Alternate text
alt-text            = f8f8f2

; Main content area background
main                = 282a36
; Sidebar background
sidebar             = 21222c
; Player bar background
player              = 282a36

; Card backgrounds (album/playlist cards)
card                = 44475a
; Shadows
shadow              = 191a21

; Selected row / scrollbar / highlighted items
selected-row        = 44475a

; Button background (play button, etc.)
button              = bd93f9
; Active/hover button
button-active       = ff79c6
; Disabled button / seekbar background
button-disabled     = 44475a

; Active tab highlight
tab-active          = 44475a

; Notification background
notification        = bd93f9
; Error notification
notification-error  = ff5555

; Miscellaneous (borders, dividers)
misc                = 6272a4
