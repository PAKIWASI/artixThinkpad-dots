  unit_byte: { foreground: "#6272a4" }       # Comment
  unit_kilo: { foreground: "#f8f8f2" }       # Foreground
  unit_mega: { foreground: "#8be9fd" }       # Cyan
  unit_giga: { foreground: "#ffb86c" }       # Orange
  unit_huge: { foreground: "#ff5555" }       # Red
users:
  user_you: { foreground: "#bd93f9" }        # Purple
