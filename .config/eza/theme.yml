  executable: { foreground: "#50fa7b" }      # Green
  mount_point: { foreground: "#8be9fd" }     # Cyan
perms:
  user_read: { foreground: "#8be9fd" }       # Cyan
  user_write: { foreground: "#bd93f9" }      # Purple
